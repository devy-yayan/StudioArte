<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudioArt-e - Contacto</title>
</head>
<body>
    <header>
        <h1>StudioArt-e - Contacto</h1>
        <p>Si tienes alguna pregunta o necesitas más información, no dudes 
            en contactarnos.</p>
    </header>
    <hr>
    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="galeria.html">Galería</a></li>
        </ul>
    </nav>
    <hr>
    <main>
        <section>
            <h2>Información de Contacto</h2>
            <form>
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" placeholder="Tu nombre" required>
                <br>

                <label for="email">Correo email:</label>
                <input type="email" id="email" placeholder="example@gmail.com" required>
                <br>

                <label for="tipo">tipo de solicitud:</label>
                  <select id="tipo" name="tipo" required>
                    <option value="">seleccione una opcion</option>
                    <option value="compra">compra</option>
                    <option value="consulta">consulta</option>
                    <option value="venta">venta</option>
                  </select>
                  <br>
                  <br>
                  <textarea id="mensaje" name="mensaje" rows="7"  placeholder="Escriba aqui su consulta/comentario" required></textarea>
                  <br>
                  <br>
                  <button type="submit">Enviar</button>
            </form> 
        </section>

        
    <hr>
    <p>Ubicación: av apoquindo 2076, Las Condes, Santiago, Chile</p>
    <p>Telefono: +56 2 1234 5678</p>
    <p>Email:STUDIOARTE@GMAIL.CL</p>
            
        
    </main>




</body>
</html>
