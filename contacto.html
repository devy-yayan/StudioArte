<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudioArt-e - Contacto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
   
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="main.pag.css">
    <link rel="stylesheet" href="contacto.css">

</head>
<body>
    <header class="text-center py-4">
        <h1 class="titulo">StudioArt-e - Contacto</h1>
        <p>Si tienes alguna pregunta o necesitas más información, no dudes 
            en contactarnos.</p>
    </header>
    <hr>
    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="galeria.html">Galería</a></li>
            <li><a class="activo" href="contacto.html">Contacto</a></li>

        </ul>
    </nav>
    <hr>
    <main class="container my-5">
        <section class="card p-4 mb shadow">
            <h2 class="subtitulos">Información de Contacto</h2>

            <form class="formulario-contacto"><!--contenedor principal del formulario-->
                <div class="mb-3 campo-formulario"><!--agrupa label + input-->

                    <label for="nombre" class="form-label">Nombre:</label>
                    <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Tu nombre" required>
                </div>

                <div class="mb-3 campo-formulario"> 
                    <label for="email" class="form-label">Correo email:</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="example@gmail.com" required>
                </div>

                <div class="mb-3 campo-formulario">

                    <label for="tipo" class="form-label">Tipo de solicitud:</label>
                    <select id="tipo" class="form-select" name="tipo" required>
                        <option value="">Seleccione una opcion</option>
                        <option value="compra">compra</option>
                        <option value="consulta">consulta</option>
                        <option value="venta">venta</option>
                  </select>
                </div>

                
                <div class="mb-3 campo-formulario">
                    <label for="mensaje" class="form-label">Mensaje</label>
                    <textarea id="mensaje" class="form-control" name="mensaje" rows="7"  placeholder="Escriba aqui su consulta/comentario" required></textarea>
                </div>


                <button type="submit" class="btn btn-warning fw-bold">Enviar</button>
            </form> 
        </section>

        
    <hr>
    <p>Ubicación: Av Apoquindo 2076, Las Condes, Santiago, Chile</p>
    <p>Telefono: +56 2 1234 5678</p>
    <p>Email:STUDIOARTE@GMAIL.CL</p>
            
        
    </main>




</body>
</html>
